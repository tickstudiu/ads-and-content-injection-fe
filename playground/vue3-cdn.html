<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AdsInjector — Vue 3 CDN Demo</title>
        <link rel="stylesheet" href="/dist/com7-ads-inject-widget-v1.0.0.css" />
        <style>
            body {
                font-family: sans-serif;
                padding: 24px;
                background: #f7f7f8;
            }
            #app {
                max-width: 800px;
                margin: 0 auto;
            }
            .badge {
                background: #42b883;
                color: #fff;
                padding: 2px 8px;
                border-radius: 4px;
                font-size: 12px;
            }
            .ad-zone {
                margin: 16px 0;
            }
            .ad-zone__label {
                display: inline-block;
                background: #f59e0b;
                color: #fff;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.5px;
                padding: 2px 8px;
                border-radius: 3px;
                margin-bottom: 6px;
                text-transform: uppercase;
            }
            .ad-zone__hint {
                color: #888;
                font-size: 12px;
                margin-left: 8px;
            }
            .com7-ads-banner img {
                width: 100%;
                max-width: 100%;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <!-- TOP BANNER -->
            <div class="ad-zone">
                <span class="ad-zone__label">Ad · Top Banner</span>
                <span class="ad-zone__hint">zone: homepage-hero</span>
                <div id="ad-top">
                    <div class="com7-ads-banner" data-mock="true">
                        <a href="https://example.com/promo-top" target="_blank" rel="noopener">
                            <img
                                src="https://placehold.co/970x120/42b883/ffffff?text=VUE+3+%E2%80%94+TOP+BANNER+970x120"
                                alt="Top Advertisement"
                            />
                        </a>
                        <button class="com7-ads-banner__close" aria-label="Close ad">×</button>
                    </div>
                </div>
            </div>

            <h1>
                Demo: Vue 3 CDN Site
                <span class="badge">Vue 3</span>
            </h1>
            <p>นี่คือหน้าเว็บที่ใช้ Vue 3 CDN — AdsInjector inject เข้ามาแบบ IIFE</p>

            <!-- INLINE BANNER -->
            <div class="ad-zone">
                <span class="ad-zone__label">Ad · Inline</span>
                <span class="ad-zone__hint">zone: article-inline</span>
                <div id="ad-inline">
                    <div class="com7-ads-banner" data-mock="true">
                        <a href="https://example.com/promo-inline" target="_blank" rel="noopener">
                            <img
                                src="https://placehold.co/728x150/8b5cf6/ffffff?text=VUE+3+%E2%80%94+INLINE+728x150"
                                alt="Inline Advertisement"
                            />
                        </a>
                        <button class="com7-ads-banner__close" aria-label="Close ad">×</button>
                    </div>
                </div>
            </div>

            <p>เนื้อหาส่วนล่างหลัง inline ad — ทดสอบ layout จริง</p>
        </div>

        <script>
            document.addEventListener('click', (e) => {
                if (e.target.matches('.com7-ads-banner__close')) {
                    const banner = e.target.closest('.com7-ads-banner[data-mock]')
                    if (banner) {
                        banner.remove()
                        console.log('[Mock Ad] closed')
                    }
                }
            })
        </script>

        <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
        <script src="/playground/env.js"></script>
        <script src="/dist/com7-ads-inject-widget-v1.0.0.js"></script>
        <script>
            const { createApp } = Vue
            const baseUrl =
                window.PLAYGROUND_CONFIG?.baseUrl || 'https://ads-n-content.free.beeceptor.com'
            const clientId = window.PLAYGROUND_CONFIG?.clientId || 'demo-client'

            createApp({
                mounted() {
                    const A = AdsInjector?.default || AdsInjector
                    A.inject('#ad-top', {
                        baseUrl,
                        clientId,
                        zoneId: 'homepage-hero',
                        onEvent: (e) => console.log('[Ad Top]', e),
                    })
                    A.inject('#ad-inline', {
                        baseUrl,
                        clientId,
                        zoneId: 'article-inline',
                        onEvent: (e) => console.log('[Ad Inline]', e),
                    })
                },
                template: '<slot></slot>',
            }).mount('#app')
        </script>
    </body>
</html>
