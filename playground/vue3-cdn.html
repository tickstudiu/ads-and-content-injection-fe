<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AdsInjector — Vue 3 CDN Demo</title>
        <link rel="stylesheet" href="/dist/com7-ads-inject-widget-v1.0.0.css" />
        <style>
            body {
                font-family: sans-serif;
                padding: 24px;
            }
            .badge {
                background: #42b883;
                color: #fff;
                padding: 2px 8px;
                border-radius: 4px;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <h1>
                Demo: Vue 3 CDN Site
                <span class="badge">Vue 3</span>
            </h1>
            <div id="ads-mount"></div>
            <p>นี่คือหน้าเว็บที่ใช้ Vue 3 CDN — AdsInjector inject เข้ามาแบบ IIFE</p>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
        <script src="/dist/com7-ads-inject-widget-v1.0.0.js"></script>
        <script>
            const { createApp } = Vue

            createApp({
                mounted() {
                    const A = AdsInjector?.default || AdsInjector
                    A.inject('#ads-mount', {
                        baseUrl: 'https://api-dev.com7.in',
                        clientId: 'shop-001',
                        zoneId: 'homepage-hero',
                        onEvent: (e) => console.log('Ad event:', e),
                    })
                },
                template: '<slot></slot>',
            }).mount('#app')
        </script>
    </body>
</html>
