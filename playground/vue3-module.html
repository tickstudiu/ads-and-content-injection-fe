<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AdsInjector — Vue 3 Module Demo</title>
        <link rel="stylesheet" href="/dist/com7-ads-inject-widget-v1.0.0.css" />
        <style>
            body {
                font-family: sans-serif;
                padding: 24px;
            }
            .badge {
                background: #42b883;
                color: #fff;
                padding: 2px 8px;
                border-radius: 4px;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="ads-mount"></div>
        <h1>
            Demo: Vue 3 Module
            <span class="badge">ESM</span>
        </h1>
        <p>นี่คือหน้าเว็บที่ใช้ Vue 3 แบบ ES module — import AdsInjector โดยตรง</p>

        <script type="module">
            import { createApp } from 'https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js'
            import AdsInjector from '/dist/com7-ads-inject-widget-v1.0.0.js'

            AdsInjector.inject('#ads-mount', {
                baseUrl: 'https://api-dev.com7.in',
                clientId: 'shop-001',
                zoneId: 'homepage-hero',
                onEvent: (e) => console.log('[Ad Event]', e),
            })
        </script>
    </body>
</html>
